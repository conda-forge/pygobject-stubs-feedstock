{% set name = "pygobject-stubs" %}
{% set version = "2.17.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pygobject_stubs-{{ version }}.tar.gz
  sha256: 66884d26974dd7fb99a8bc5972b5bdeb4b7399ecc7ac53913a6cafa6ab21491f

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=65.0.0
    - pip
  run:
    - python >={{ python_min }}

test:
  commands:
    - pip check
    - pip show pygobject-stubs
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/pygobject/pygobject-stubs
  summary: Typing stubs for PyGObject
  license: LGPL-2.1-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - MilkClouds
